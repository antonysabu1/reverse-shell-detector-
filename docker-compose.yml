version: '3.8'

services:
  # 🗡️ Attacker Container: Listens for incoming connections
  attacker:
    build: ./attacker
    container_name: shellsnare-attacker
    networks:
      - lab_network
    volumes:
      - ./attacker:/opt/attacker
    stdin_open: true # Allows interactive terminal
    tty: true

  # 💻 Victim Container: Executes the reverse shell payloads
  victim:
    build: ./victim
    container_name: shellsnare-victim
    networks:
      - lab_network
    volumes:
      - ./victim:/opt/victim
    stdin_open: true
    tty: true

  # 🔎 Detector Container: Sniffs traffic on the network
  detector:
    build: ./detector
    container_name: shellsnare-detector
    network_mode: "container:shellsnare-victim"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    depends_on:
      - victim
    volumes:
      - ./detector:/opt/detector
      - ./data:/data  # Store sqlite database and pcaps
    command: python3 detector.py
    tty: true

  # 📊 Dashboard Container: Web UI for monitoring
  dashboard:
    build: ./dashboard
    container_name: shellsnare-dashboard
    ports:
      - "8080:8080"
    networks:
      - lab_network
    volumes:
      - ./dashboard:/app
      - ./data:/data  # Read sqlite database written by detector
    depends_on:
      - detector
    command: python3 app.py

networks:
  lab_network:
    driver: bridge
